<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="avatar">A</div>
      <h1 class="name">Anmisha</h1>
      <p class="role">CSE Student · Full-Stack Dev</p>
      <div class="skills">
        <span class="badge blue">HTML</span>
        <span class="badge green">CSS</span>
        <span class="badge amber">JavaScript</span>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="stat-value">1</span>
          <span class="stat-label">Projects</span>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <span class="stat-value">2nd yr</span>
          <span class="stat-label">Year</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
